services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: zwep_meili
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-zwep_dev_master_key_change_me}
      MEILI_ENV: development
    volumes:
      - ./.meili_data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: zwep_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
